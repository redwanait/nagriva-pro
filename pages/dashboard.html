  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var nameEl = document.getElementById('dashUserName');
      if (nameEl) {
        try {
          var user = await NagrivaOrders.getCurrentUser();
          if (user) {
            var displayName = user.user_metadata?.full_name || user.email?.split('@')[0] || '';
            if (displayName) nameEl.textContent = ', ' + displayName.split(' ')[0];
          }
        } catch (e) { /* silent */ }
      }

      /* Plan greeting badge */
      function updateDashGreetingBadge() {
        var badge = document.getElementById('dashGreetingBadge');
        if (!badge || !window.NagrivaPlanManager) return;
        if (NagrivaPlanManager.isPro()) {
          badge.className = 'dash-greeting-badge dash-greeting-badge-pro';
          badge.textContent = 'PRO';
        } else {
          badge.className = 'dash-greeting-badge dash-greeting-badge-free';
          badge.textContent = 'FREE';
        }
      }
      if (window.NagrivaPlanManager) {
        if (!NagrivaPlanManager.isLoading()) updateDashGreetingBadge();
        NagrivaPlanManager.subscribe(function (planState) { console.log('[PLAN FLOW] subscriber received', planState); updateDashGreetingBadge(); });
      }

      try {
        var admin = await NagrivaAdminAuth.isAdmin(true);
        var link = document.getElementById('adminLink');
        if (link && admin) link.style.display = '';
      } catch (e) { /* silent */ }

      if (window.NAGRIVA_Dashboard) {
        window.NAGRIVA_Dashboard.init();
      }

      /* Handle checkout success */
      var params = new URLSearchParams(window.location.search);
      if (params.get('checkout') === 'success') {
        if (window.NagrivaPlanManager) {
          NagrivaPlanManager.refreshPlan();
        }
        if (window.NagrivaSubscriptionManager) {
          NagrivaSubscriptionManager.fetchSubscription(NagrivaAuthStore.getUser()?.id);
        }
        /* Show toast */
        if (window.NAGRIVA_Toast) {
          NAGRIVA_Toast.success('Welcome to Nagriva Pro!', 'Your subscription is active.');
        }
        /* Clean URL */
        var cleanUrl = window.location.pathname;
        window.history.replaceState({}, '', cleanUrl);
      }
    });
  </script>
