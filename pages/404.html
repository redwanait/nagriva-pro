  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --accent: #FACC15;
      --accent2: #F59E0B;
      --border: rgba(255, 255, 255, 0.07);
      --white: #ffffff;
      --gray: #A1A1AA;
      --gray2: #71717A;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 32px 24px;
    }

    .grid-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .grid-bg::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(250,204,21,0.025) 0%, transparent 60%);
      pointer-events: none;
    }

    .glow-orb {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(250,204,21,0.05) 0%, transparent 70%);
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: orbPulse 8s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.15); }
    }

    body .cookie-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      top: auto;
      inset: auto 0 0 0;
      height: auto;
      z-index: 99999;
      display: flex;
      justify-content: center;
      pointer-events: none;
      padding: 0 16px 20px;
    }
    body .cookie-overlay .cookie-banner {
      max-width: 780px;
      margin: 0;
      pointer-events: auto;
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 56px;
      transition: opacity var(--transition);
    }
    .logo-link:hover { opacity: 0.75; }
    .logo-icon {
      width: 30px; height: 30px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .error-code-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
    }
    .error-code-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 130%;
      height: 130%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center, rgba(250,204,21,0.15) 0%, rgba(250,204,21,0.04) 40%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }
    .error-code {
      position: relative;
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 40%, #FDE047 70%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: shimmer 8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .description {
      color: var(--gray2);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 380px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn svg { flex-shrink: 0; transition: transform var(--transition); }

    .btn--primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
    }
    .btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(250,204,21,0.25);
    }
    .btn--primary:hover svg { transform: translateX(-3px); }

    .btn--ghost {
      background: transparent;
      color: var(--gray2);
      border: 1px solid var(--border);
    }
    .btn--ghost:hover {
      color: var(--accent);
      border-color: rgba(250,204,21,0.2);
      background: rgba(250,204,21,0.04);
      transform: translateY(-2px);
    }
    .btn--ghost:hover svg { transform: translateX(3px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      body { padding: 24px 16px; }
      .logo-link { margin-bottom: 44px; }
      .logo-icon { width: 26px; height: 26px; }
      .logo-text { font-size: 0.9rem; }
      .error-code { font-size: clamp(4.5rem, 22vw, 6rem); }
      .subtitle { font-size: 0.85rem; margin-bottom: 12px; }
      .description { font-size: 0.85rem; margin-bottom: 28px; }
      .actions { flex-direction: column; width: 100%; }
      .btn { width: 100%; padding: 13px 24px; }
      body .cookie-overlay { padding: 0 8px 12px; }
    }
