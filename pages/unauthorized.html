  <link rel="stylesheet" href="../css/mobile-optimizations.css" /><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --accent: #FACC15;
      --accent-glow: rgba(59, 130, 246, 0.08);
      --border: rgba(255, 255, 255, 0.06);
      --gray: #a1a1aa;
      --gray2: #71717a;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .glow {
      position: fixed;
      top: -300px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(250,204,21,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lock {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 1.5rem;
      color: #ef4444;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    p {
      color: var(--gray);
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: var(--accent);
      color: #050505;
      font-weight: 600;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 20px rgba(250,204,21,0.15);
      transform: translateY(-2px);
    }
    .btn svg { transition: transform 0.3s ease; }
    .btn:hover svg { transform: translateX(3px); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
    }
  </style>
