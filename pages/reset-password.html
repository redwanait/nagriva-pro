<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — NAGRIVA</title>
  <meta name="description" content="Set a new password for your NAGRIVA account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mobile-optimizations.css" />
  <link rel="stylesheet" href="../css/performance.css" />
  <link rel="stylesheet" href="../css/auth.css" media="print" onload="this.media='all'" />
  <link rel="icon" type="image/png" href="../assets/images/branding/nagriva-logo.png" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <a href="../index.html">
        <img src="../assets/images/branding/nagriva-logo.png" alt="NAGRIVA" />
        <span>NAGRIVA</span>
      </a>
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Set new password</h1>
      <p class="auth-subtitle">Enter your new password below.</p>
    </div>

    <div id="resetForm" style="display:none;">
      <form class="auth-form" id="newPasswordForm" autocomplete="off" novalidate>
        <div class="auth-message" id="resetMessage"></div>

        <div class="auth-field">
          <label class="auth-label">New Password</label>
          <input type="password" class="auth-input" id="newPassword" placeholder="Enter new password" autocomplete="new-password" />
        </div>

        <div class="auth-field">
          <label class="auth-label">Confirm Password</label>
          <input type="password" class="auth-input" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" />
        </div>

        <button type="submit" class="auth-btn" id="resetSubmit">
          <span class="auth-btn-text">Update Password</span>
          <span class="auth-btn-spinner"></span>
        </button>
      </form>
    </div>

    <div id="resetSuccess" style="display:none; text-align:center; padding: 20px 0;">
      <div class="auth-forgot-success-icon" style="margin: 0 auto 16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <p style="color: var(--gray); font-size: 0.9rem; line-height: 1.6;">Password updated successfully! Redirecting to sign in...</p>
    </div>

    <div id="resetInvalid" style="display:none; text-align:center; padding: 20px 0;">
      <div class="auth-forgot-success-icon" style="margin: 0 auto 16px; background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.15);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff5050" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <p style="color: var(--gray); font-size: 0.9rem; line-height: 1.6;">This reset link is invalid or has expired. Please request a new one.</p>
      <a href="forgot-password.html" class="auth-btn" style="display:inline-flex; width:auto; margin-top:16px; text-decoration:none;">Request New Link</a>
    </div>

    <div class="auth-footer-text">
      <a href="login.html">Back to sign in</a>
    </div>

  </div>

  <p class="auth-legal">&copy; 2026 NAGRIVA. All rights reserved.</p>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var resetForm = document.getElementById('resetForm');
      var resetSuccess = document.getElementById('resetSuccess');
      var resetInvalid = document.getElementById('resetInvalid');
      var msg = document.getElementById('resetMessage');
      var submitBtn = document.getElementById('resetSubmit');

      try {
        var { data: { session } } = await window.supabaseClient.auth.getSession();

        if (!session) {
          resetForm.style.display = 'none';
          resetInvalid.style.display = 'block';
          return;
        }

        resetForm.style.display = 'block';

        document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
          e.preventDefault();
          msg.className = 'auth-message';

          var password = document.getElementById('newPassword').value.trim();
          var confirm = document.getElementById('confirmPassword').value.trim();

          if (!password) {
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Please enter a new password.';
            msg.className = 'auth-message error show';
            return;
          }

          if (password.length < 6) {
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Password must be at least 6 characters.';
            msg.className = 'auth-message error show';
            return;
          }

          if (password !== confirm) {
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Passwords do not match.';
            msg.className = 'auth-message error show';
            return;
          }

          submitBtn.classList.add('loading');

          try {
            var { error } = await window.supabaseClient.auth.updateUser({ password: password });

            submitBtn.classList.remove('loading');

            if (error) {
              msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ' + (error.message || 'Failed to update password.');
              msg.className = 'auth-message error show';
              return;
            }

            resetForm.style.display = 'none';
            resetSuccess.style.display = 'block';

            setTimeout(function() {
              window.location.href = 'login.html';
            }, 2000);
          } catch (err) {
            submitBtn.classList.remove('loading');
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Network error. Please try again.';
            msg.className = 'auth-message error show';
          }
        });
      } catch (err) {
        resetForm.style.display = 'none';
        resetInvalid.style.display = 'block';
      }
    });
  </script>
  <script defer src="../js/navbar.js"></script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
</body>
</html>
