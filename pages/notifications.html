<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Nagriva</title>
  <meta name="description" content="Your Nagriva notifications." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mobile-optimizations.css" />
  <link rel="stylesheet" href="../css/performance.css" />
  <link rel="stylesheet" href="../css/auth.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../css/chatbot.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../css/floating-elements.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../components/notifications-dropdown/notifications-dropdown.css" media="print" onload="this.media='all'" />
  <style>
    .notif-page { padding-top: 100px; min-height: 100vh; }
    .notif-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .notif-header h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
    .notif-header-right { display: flex; align-items: center; gap: 12px; }
    .notif-mark-read {
      padding: 8px 16px; border-radius: 99px; font-size: 0.8rem; font-weight: 500;
      color: var(--gray); border: 1px solid var(--border2); background: none;
      cursor: pointer; font-family: inherit; transition: all 0.2s ease;
    }
    .notif-mark-read:hover { color: var(--white); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
    .notif-filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .notif-filter {
      padding: 6px 16px; border-radius: 99px; font-size: 0.8rem; font-weight: 500;
      color: var(--gray2); border: 1px solid transparent; background: none;
      cursor: pointer; font-family: inherit; transition: all 0.2s ease;
    }
    .notif-filter:hover { color: var(--gray); }
    .notif-filter.active { color: var(--accent); border-color: rgba(59,130,246,0.2); background: rgba(59,130,246,0.06); }
    .notif-count { font-size: 0.7rem; color: var(--gray2); margin-left: 4px; }
    .notif-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 40px; }
    .notif-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px; background: rgba(255,255,255,0.015);
      border: 1px solid var(--border); border-radius: 14px;
      transition: border-color 0.2s ease; cursor: pointer;
    }
    .notif-item:hover { border-color: rgba(255,255,255,0.1); }
    .notif-item.unread { background: rgba(59,130,246,0.02); border-color: rgba(59,130,246,0.08); }
    .notif-item.unread .notif-dot { display: block; }
    .notif-dot {
      display: none; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 6px;
      box-shadow: 0 0 8px rgba(59,130,246,0.3);
    }
    .notif-content { flex: 1; min-width: 0; }
    .notif-title { font-size: 0.88rem; font-weight: 500; color: var(--white); margin-bottom: 2px; }
    .notif-item.unread .notif-title { font-weight: 600; }
    .notif-text { font-size: 0.82rem; color: var(--gray); line-height: 1.5; }
    .notif-time { font-size: 0.72rem; color: var(--gray2); margin-top: 6px; }
    @keyframes nf-fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes nf-float-icon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .notif-empty {
      text-align: center; padding: 60px 20px;
      background: rgba(255,255,255,0.015); border: 1px solid var(--border);
      border-radius: 18px;
      animation: nf-fadeInUp 0.5s ease-out;
    }
    .notif-empty-icon { width: 52px; height: 52px; margin: 0 auto 18px; border-radius: 50%; background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.1); display: flex; align-items: center; justify-content: center; color: var(--accent); animation: nf-float-icon 3s ease-in-out infinite; transition: all 0.3s ease; }
    .notif-empty:hover .notif-empty-icon { background: rgba(59,130,246,0.09); border-color: rgba(59,130,246,0.2); transform: scale(1.05); }
    .notif-empty h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--white); margin-bottom: 8px; }
    .notif-empty p { font-size: 0.85rem; color: var(--gray2); line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ─── Notifications Skeleton (reuses global sk-* classes from performance.css) ─── */

    @media (max-width: 768px) {
      .notif-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
  <style>.nag-guard-overlay{position:fixed;inset:0;z-index:999999;background:#040404;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}.nag-guard-spinner{width:40px;height:40px;border:2px solid rgba(59,130,246,0.1);border-top-color:#3b82f6;border-radius:50%;animation:nagGuardSpin .8s linear infinite}.nag-guard-text{color:#a1a1aa;font-size:.85rem;font-family:'DM Sans',sans-serif}@keyframes nagGuardSpin{to{transform:rotate(360deg)}}</style>
</head>
<body data-page="notifications">
  <div class="nag-guard-overlay" id="nagGuardOverlay"><div class="nag-guard-spinner"></div><span class="nag-guard-text">Checking access...</span></div>
  <div id="navbar-container"></div>

  <section class="notif-page">
    <div class="container">
      <div class="notif-header">
        <h1>Notifications</h1>
        <div class="notif-header-right">
          <button class="notif-mark-read" id="markAllRead">Mark all as read</button>
        </div>
      </div>

      <div class="notif-filters">
        <button class="notif-filter active" data-filter="all">All</button>
        <button class="notif-filter" data-filter="unread">Unread</button>
        <button class="notif-filter" data-filter="projects">Projects</button>
        <button class="notif-filter" data-filter="billing">Billing</button>
      </div>

      <div class="notif-list" id="notifList"></div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/auth-guard.js"></script>
  <script defer src="../js/script.js"></script>
  <script defer src="../js/i18n.js"></script>
  <script defer src="../js/auth.js"></script>
  <script defer src="../js/skeleton.js"></script>
  <script defer src="../js/loading-manager.js"></script>
  <script defer src="../js/empty-state.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      var currentFilter = 'all';
      var notifications = [];
      var currentUserId = null;
      var isLoading = true;
      var loadError = null;

      var TYPE_CATEGORY = {
        project_update: 'projects',
        message: 'projects',
        payment: 'billing',
        report: 'projects',
        milestone: 'projects'
      };

      function timeAgo(dateStr) {
        var now = new Date();
        var date = new Date(dateStr);
        var seconds = Math.floor((now - date) / 1000);
        if (seconds < 60) return 'just now';
        var minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + (minutes === 1 ? ' minute ago' : ' minutes ago');
        var hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + (hours === 1 ? ' hour ago' : ' hours ago');
        var days = Math.floor(hours / 24);
        if (days < 30) return days + (days === 1 ? ' day ago' : ' days ago');
        var months = Math.floor(days / 30);
        return months + (months === 1 ? ' month ago' : ' months ago');
      }

      function getCategory(type) {
        return TYPE_CATEGORY[type] || 'projects';
      }

      function getFiltered() {
        if (currentFilter === 'all') return notifications;
        if (currentFilter === 'unread') return notifications.filter(function(n) { return !n.is_read; });
        return notifications.filter(function(n) { return getCategory(n.type) === currentFilter; });
      }

      function getUnreadCount() {
        return notifications.filter(function(n) { return !n.is_read; }).length;
      }

      function renderLoading() {
        var list = document.getElementById('notifList');
        if (window.NAGRIVA_Loading && window.NAGRIVA_Skeleton) {
          window.NAGRIVA_Loading.show(list, window.NAGRIVA_Skeleton.notifications(4));
        } else if (window.NAGRIVA_Skeleton) {
          list.innerHTML = window.NAGRIVA_Skeleton.notifications(4);
        }
      }

      function renderError(msg) {
        var list = document.getElementById('notifList');
        list.innerHTML = NAGRIVA_EmptyState.render({
          icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
          title: 'Something went wrong',
          description: msg,
          variant: 'error'
        });
      }

      function renderEmpty() {
        var list = document.getElementById('notifList');
        var title, msg, icon;
        if (currentFilter === 'unread') {
          title = 'No unread notifications';
          msg = 'You\'ve read everything. Mark notifications as unread or wait for new ones to arrive.';
          icon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
        } else {
          title = 'All caught up!';
          msg = 'You\'re all caught up! New notifications will appear here as they arrive.';
          icon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
        }
        list.innerHTML = NAGRIVA_EmptyState.render({
          icon: icon,
          title: title,
          description: msg
        });
      }

      function renderNotifications() {
        var list = document.getElementById('notifList');
        var filtered = getFiltered();

        if (filtered.length === 0) {
          renderEmpty();
          return;
        }

        list.innerHTML = '';
        filtered.forEach(function(n) {
          var item = document.createElement('div');
          item.className = 'notif-item' + (!n.is_read ? ' unread' : '');
          item.dataset.id = n.id;

          var dot = document.createElement('span');
          dot.className = 'notif-dot';
          item.appendChild(dot);

          var content = document.createElement('div');
          content.className = 'notif-content';

          var title = document.createElement('div');
          title.className = 'notif-title';
          title.textContent = n.title;
          content.appendChild(title);

          var text = document.createElement('div');
          text.className = 'notif-text';
          text.textContent = n.message;
          content.appendChild(text);

          var time = document.createElement('div');
          time.className = 'notif-time';
          time.textContent = timeAgo(n.created_at);
          content.appendChild(time);

          item.appendChild(content);
          list.appendChild(item);

          item.addEventListener('click', function() {
            if (!n.is_read) {
              markRead(n.id);
              n.is_read = true;
              this.classList.remove('unread');
              updateCounts();
            }
            if (n.link) {
              window.location.href = n.link;
            }
          });
        });
      }

      function updateCounts() {
        var total = getUnreadCount();
        document.querySelectorAll('.notif-filter').forEach(function(btn) {
          var filter = btn.dataset.filter;
          var el = btn.querySelector('.notif-count');
          var count;
          if (filter === 'all' || filter === 'unread') count = total;
          else count = notifications.filter(function(n) { return getCategory(n.type) === filter && !n.is_read; }).length;

          if (count > 0) {
            if (!el) {
              el = document.createElement('span');
              el.className = 'notif-count';
              btn.appendChild(el);
            }
            el.textContent = '(' + count + ')';
          } else {
            if (el) el.remove();
          }
        });
      }

      async function fetchNotifications() {
        isLoading = true;
        loadError = null;
        renderLoading();

        try {
          var { data, error } = await window.supabaseClient
            .from('notifications')
            .select('*')
            .eq('user_id', currentUserId)
            .order('created_at', { ascending: false })
            .limit(50);

          if (error) throw error;

          notifications = data || [];
          renderNotifications();
          updateCounts();
        } catch (err) {
          loadError = err.message || 'Could not load notifications.';
          renderError(loadError);
        } finally {
          isLoading = false;
        }
      }

      async function markRead(id) {
        try {
          await window.supabaseClient
            .from('notifications')
            .update({ is_read: true })
            .eq('id', id)
            .eq('user_id', currentUserId);
        } catch (err) {
          console.error('Failed to mark notification as read:', err);
        }
      }

      async function markAllRead() {
        try {
          await window.supabaseClient
            .from('notifications')
            .update({ is_read: true })
            .eq('user_id', currentUserId)
            .eq('is_read', false);

          notifications.forEach(function(n) { n.is_read = true; });
          renderNotifications();
          updateCounts();
        } catch (err) {
          console.error('Failed to mark all as read:', err);
        }
      }

      function subscribeRealtime() {
        var channel = window.supabaseClient
          .channel('notifications-realtime')
          .on('postgres_changes',
            {
              event: 'INSERT',
              schema: 'public',
              table: 'notifications',
              filter: 'user_id=eq.' + currentUserId
            },
            function(payload) {
              var n = payload.new;
              notifications.unshift(n);
              if (currentFilter === 'all' || currentFilter === 'unread' || getCategory(n.type) === currentFilter) {
                renderNotifications();
              }
              updateCounts();
            }
          )
          .subscribe();
      }

      /* ── Init ── */
      var { data: { session } } = await window.supabaseClient.auth.getSession();
      if (!session) return;
      currentUserId = session.user.id;

      await fetchNotifications();
      subscribeRealtime();

      document.querySelectorAll('.notif-filter').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.notif-filter').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          renderNotifications();
        });
      });

      document.getElementById('markAllRead').addEventListener('click', markAllRead);
    });
  </script>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  <script defer src="../js/user-avatar.js"></script>
  <script defer src="../js/navbar.js"></script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
  <script defer src="../js/cookie-consent.js"></script>
<div id="cookie-consent-container"></div>
</body>
</html>
