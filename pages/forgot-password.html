<body class="auth-page">

  <main class="auth-card" aria-labelledby="authTitle">
    <a class="auth-back-link" href="../index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
    <div class="auth-logo">
      <img src="../assets/images/branding/nagriva-logo.png" alt="Nagriva" />
    </div>

    <header class="auth-header">
      <h1 class="auth-title" id="authTitle">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
    </header>

    <form class="auth-form" id="forgotForm" autocomplete="off" novalidate>
      <div class="auth-message" id="forgotMessage" role="alert"></div>

      <div id="forgotFormWrap">
        <div class="auth-field">
          <label class="auth-label" for="forgotEmail">Email</label>
          <input id="forgotEmail" name="email" type="email" class="auth-input" placeholder="you@company.com" autocomplete="email" />
        </div>

        <button type="submit" class="auth-btn" id="forgotSubmit">
          <span class="auth-btn-text">Send Reset Link</span>
          <span class="auth-btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <div class="auth-forgot-success" id="forgotSuccess" style="display:none;">
        <div class="auth-forgot-success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <p class="auth-forgot-success-text">Check your email for a password reset link. If it doesn't appear within a few minutes, check your spam folder.</p>
      </div>

      <p class="auth-switch">Remember your password? <a href="login.html">Back to sign in</a></p>
      <p class="auth-switch" style="margin-top:-8px;">Don't have an account? <a href="signup.html">Create one</a></p>
    </form>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/i18n.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('forgotSubmit');
      var msg = document.getElementById('forgotMessage');
      var wrap = document.getElementById('forgotFormWrap');
      var success = document.getElementById('forgotSuccess');

      btn.classList.add('loading');
      msg.className = 'auth-message';

      var email = document.getElementById('forgotEmail').value.trim();

      if (!email) {
        msg.textContent = 'Please enter your email address.';
        msg.className = 'auth-message error show';
        btn.classList.remove('loading');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.textContent = 'Please enter a valid email address.';
        msg.className = 'auth-message error show';
        btn.classList.remove('loading');
        return;
      }

      try {
        var redirectTo = window.location.origin + '/pages/reset-password.html';
        var result = await window.supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: redirectTo
        });

        btn.classList.remove('loading');

        if (result.error) {
          var errMsg = result.error.message || 'Failed to send reset link.';
          if (errMsg.toLowerCase().includes('rate') || errMsg.toLowerCase().includes('too many')) {
            errMsg = 'Too many requests. Please wait a moment before trying again.';
          } else if (errMsg.toLowerCase().includes('email') && (errMsg.toLowerCase().includes('not found') || errMsg.toLowerCase().includes('no user'))) {
            errMsg = 'If an account with this email exists, you will receive a reset link.';
          }
          msg.textContent = errMsg;
          msg.className = 'auth-message error show';
          return;
        }

        wrap.style.display = 'none';
        success.style.display = 'flex';
        success.className = 'auth-forgot-success show';
      } catch (err) {
        btn.classList.remove('loading');
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'auth-message error show';
      }
    });
  </script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
  <div id="cookie-consent-container"></div>
<script defer src="../js/layout.js"></script>
</body>
