<body class="auth-page">
  <main class="auth-card" aria-labelledby="authTitle">
    <a class="auth-back-link" href="../index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
    <div class="auth-logo">
      <img src="../assets/images/branding/nagriva-logo.png" alt="Nagriva" />
    </div>

    <header class="auth-header">
      <h1 class="auth-title" id="authTitle">Create your account</h1>
      <p class="auth-subtitle">Start managing your growth workspace.</p>
    </header>

    <form class="auth-form" id="signUpForm" autocomplete="on" novalidate>
      <div class="auth-message" id="signupMessage" role="alert"></div>

      <div class="auth-field">
        <label class="auth-label" for="signupName">Name</label>
        <input id="signupName" name="name" type="text" class="auth-input" placeholder="Your name" autocomplete="name" />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="signupEmail">Email</label>
        <input id="signupEmail" name="email" type="email" class="auth-input" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="signupPassword">Password</label>
        <div class="auth-pw">
          <input id="signupPassword" name="password" type="password" class="auth-input" placeholder="Create a password" autocomplete="new-password" />
          <button type="button" class="auth-pw-toggle" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="auth-pw-strength" id="signupPwStrength">
          <div class="auth-pw-bar">
            <div class="auth-pw-fill" id="signupPwFill"></div>
          </div>
          <span class="auth-pw-label" id="signupPwLabel"></span>
          <div class="auth-pw-reqs" id="signupPwReqs">
            <div class="auth-pw-req" data-req="length">
              <span class="auth-pw-req-icon"></span>
              <span>Minimum 8 characters</span>
            </div>
            <div class="auth-pw-req" data-req="upper">
              <span class="auth-pw-req-icon"></span>
              <span>Uppercase letter</span>
            </div>
            <div class="auth-pw-req" data-req="lower">
              <span class="auth-pw-req-icon"></span>
              <span>Lowercase letter</span>
            </div>
            <div class="auth-pw-req" data-req="number">
              <span class="auth-pw-req-icon"></span>
              <span>Number</span>
            </div>
            <div class="auth-pw-req" data-req="special">
              <span class="auth-pw-req-icon"></span>
              <span>Special character</span>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="signupSubmit">
        <span class="auth-btn-text">Create account</span>
        <span class="auth-btn-spinner" aria-hidden="true"></span>
      </button>

      <button type="button" class="auth-social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        <span>Continue with GitHub</span>
      </button>
      <button type="button" class="auth-social-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
        <span>Continue with Google</span>
      </button>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </form>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/auth.js"></script>
  <script>
    (function() {
      var form = document.getElementById('signUpForm');
      var msg = document.getElementById('signupMessage');
      var btn = document.getElementById('signupSubmit');

      var pwInput = document.getElementById('signupPassword');
      var pwStrength = document.getElementById('signupPwStrength');
      var pwFill = document.getElementById('signupPwFill');
      var pwLabel = document.getElementById('signupPwLabel');
      var pwReqs = document.querySelectorAll('.auth-pw-req');
      var reqIcons = document.querySelectorAll('.auth-pw-req-icon');

      var CHECK_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      var CROSS_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

      function getPasswordScore(pw) {
        var s = 0;
        if (pw.length >= 8) s += 1;
        if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s += 1;
        if (/\d/.test(pw)) s += 1;
        if (/[^a-zA-Z0-9]/.test(pw)) s += 1;
        return s;
      }

      var LEVELS = ['weak', 'fair', 'good', 'strong'];
      var LABELS = ['Weak', 'Fair', 'Good', 'Strong'];

      function updatePasswordUI(pw) {
        if (!pw) {
          pwStrength.classList.remove('visible');
          return;
        }
        pwStrength.classList.add('visible');
        var score = getPasswordScore(pw);
        var idx = score === 0 ? 0 : Math.min(score - 1, 3);
        pwFill.className = 'auth-pw-fill ' + LEVELS[idx];
        pwLabel.textContent = LABELS[idx];
        pwLabel.className = 'auth-pw-label ' + LEVELS[idx];

        var checks = [
          pw.length >= 8,
          /[A-Z]/.test(pw),
          /[a-z]/.test(pw),
          /\d/.test(pw),
          /[^a-zA-Z0-9]/.test(pw)
        ];
        pwReqs.forEach(function(r, i) {
          var met = checks[i];
          r.classList.toggle('met', met);
          reqIcons[i].innerHTML = met ? CHECK_ICON : CROSS_ICON;
        });
      }

      pwInput.addEventListener('input', function() {
        updatePasswordUI(pwInput.value);
      });

      function setMessage(type, text) {
        msg.textContent = text;
        msg.className = 'auth-message ' + type + ' show';
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var name = form.name.value.trim();
        var email = form.email.value.trim();
        var password = form.password.value.trim();
        msg.className = 'auth-message';

        if (!name) {
          setMessage('error', 'Enter your name.');
          return;
        }
        if (!/\S+@\S+\.\S+/.test(email)) {
          setMessage('error', 'Enter a valid email address.');
          return;
        }
        if (password.length < 6) {
          setMessage('error', 'Use at least 6 characters for your password.');
          return;
        }

        btn.classList.add('loading');
        window.supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: { data: { full_name: name } }
        }).then(function(resp) {
          if (resp.error) {
            var text = resp.error.message || 'Unable to create your account.';
            if (text.toLowerCase().includes('already registered') || text.toLowerCase().includes('already exists')) {
              text = 'An account with this email already exists.';
            }
            setMessage('error', text);
            return;
          }

          if (resp.data && resp.data.user) {
            window.supabaseClient.functions.invoke('send-email', {
              body: {
                type: 'welcome',
                user_id: resp.data.user.id,
                email: email,
                full_name: name,
                first_name: name.split(' ')[0]
              }
            }).catch(function(e) {
              console.warn('[Auth] Failed to send welcome email:', e.message);
            });
          }

          if (resp.data && !resp.data.session) {
            setMessage('success', 'Account created. Check your email to confirm.');
          } else {
            setMessage('success', 'Account created. Redirecting...');
            window.location.href = 'dashboard.html';
          }
        }).catch(function() {
          setMessage('error', 'Network error. Please try again.');
        }).finally(function() {
          btn.classList.remove('loading');
        });
      });
    })();
  </script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
  <div id="cookie-consent-container"></div>
<script defer src="../js/layout.js"></script>
</body>
