  <!-- ══════════════════════════ AUTH PAGE ══════════════════════════ -->
  <div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>

    <div class="auth-card">
      <div class="auth-card-glow"></div>

      <div class="auth-card-header">
        <div class="auth-card-logo">
          <img src="../assets/images/branding/nagriva-logo.png" alt="NAGRIVA" />
          <span>NAGRIVA</span>
        </div>
        <h1 class="auth-card-title">Welcome back</h1>
        <p class="auth-card-subtitle">Sign in to your account to continue.</p>
      </div>

      <form class="auth-card-form" id="signInForm" autocomplete="off" novalidate>
        <div class="auth-page-message" id="signinMessage"></div>

        <div class="ap-form-group">
          <label class="ap-form-label">Email Address</label>
          <div class="ap-input-wrap">
            <svg class="ap-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" class="ap-input" placeholder="you@company.com" autocomplete="email" />
          </div>
        </div>

        <div class="ap-form-group">
          <div class="ap-label-row">
            <label class="ap-form-label">Password</label>
            <a href="forgot-password.html" class="ap-forgot-link">Forgot password?</a>
          </div>
          <div class="ap-input-wrap">
            <svg class="ap-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="ap-input" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="ap-pw-toggle" aria-label="Toggle password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="ap-remember">
          <input type="checkbox" checked />
          <span class="ap-remember-label">Keep me signed in</span>
        </label>

        <button type="submit" class="ap-submit" id="signinSubmit">
          <span class="ap-submit-text">Sign In</span>
          <span class="ap-submit-spinner"></span>
        </button>

        <div class="ap-divider">
          <span class="ap-divider-line"></span>
          <span class="ap-divider-text">or continue with</span>
          <span class="ap-divider-line"></span>
        </div>

        <div class="ap-social">
          <button type="button" class="ap-social-btn">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
            <span>Continue with Google</span>
          </button>
          <button type="button" class="ap-social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
            <span>Continue with GitHub</span>
          </button>
        </div>

        <div class="ap-footer">
          <span>Don't have an account? </span>
          <a href="signup.html">Create one</a>
        </div>
      </form>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/i18n.js"></script>
  <script>
    // Password toggle
    document.querySelectorAll('.ap-pw-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = this.parentElement.querySelector('.ap-input');
        if (!input) return;
        var isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        this.innerHTML = isPw
          ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
          : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      });
    });

    // Get redirect param
    var params = new URLSearchParams(window.location.search);
    var redirectAfterLogin = params.get('redirect') || 'dashboard.html';

    // Sign in form handling
    document.getElementById('signInForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('signinSubmit');
      btn.classList.add('loading');
      var msg = document.getElementById('signinMessage');

      var email = this.querySelector('.ap-input[type="email"]').value.trim();
      var password = this.querySelector('.ap-input[type="password"]').value.trim();

      if (!email || !password) {
        msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Please fill in all fields.';
        msg.className = 'auth-page-message error show';
        btn.classList.remove('loading');
        return;
      }

      window.supabaseClient.auth.signInWithPassword({ email: email, password: password })
        .then(function(resp) {
          btn.classList.remove('loading');
          if (resp.error) {
            var errMsg = resp.error.message || 'Invalid credentials.';
            if (errMsg.toLowerCase().includes('invalid login credentials')) errMsg = 'Invalid email or password. Please try again.';
            if (errMsg.toLowerCase().includes('email not confirmed')) errMsg = 'Please confirm your email address before signing in. Check your inbox.';
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ' + errMsg;
            msg.className = 'auth-page-message error show';
          } else {
            msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Signed in successfully! Redirecting...';
            msg.className = 'auth-page-message success show';
            /* Role-based redirect: admin users go to admin dashboard */
            (async function() {
              try {
                var { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                  var { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();
                  if (profile?.role === 'admin' && !redirectAfterLogin.includes('admin')) {
                    window.location.href = 'admin-dashboard.html';
                    return;
                  }
                }
              } catch (e) {}
              window.location.href = redirectAfterLogin;
            })();
          }
        })
        .catch(function(err) {
          btn.classList.remove('loading');
          msg.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Network error. Please try again.';
          msg.className = 'auth-page-message error show';
        });
    });
  </script>
