<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - NAGRIVA</title>
  <meta name="description" content="Sign in to your NAGRIVA account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mobile-optimizations.css" />
  <link rel="stylesheet" href="../css/performance.css" />
  <link rel="stylesheet" href="../css/auth.css" media="print" onload="this.media='all'" />
  <link rel="icon" type="image/png" href="../assets/images/branding/nagriva-logo.png" />
</head>
<body class="auth-page">
  <main class="auth-card" aria-labelledby="authTitle">
    <a class="auth-logo" href="../index.html" aria-label="NAGRIVA home">
      <img src="../assets/images/branding/nagriva-logo.png" alt="" />
      <span>NAGRIVA</span>
    </a>

    <header class="auth-header">
      <h1 class="auth-title" id="authTitle">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your workspace.</p>
    </header>

    <form class="auth-form" id="signInForm" autocomplete="on" novalidate>
      <div class="auth-message" id="signinMessage" role="alert"></div>

      <div class="auth-field">
        <label class="auth-label" for="signinEmail">Email</label>
        <input id="signinEmail" name="email" type="email" class="auth-input" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="signinPassword">Password</label>
          <a href="forgot-password.html" class="auth-forgot">Forgot?</a>
        </div>
        <div class="auth-pw">
          <input id="signinPassword" name="password" type="password" class="auth-input" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="auth-pw-toggle" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="signinSubmit">
        <span class="auth-btn-text">Sign in</span>
        <span class="auth-btn-spinner" aria-hidden="true"></span>
      </button>

      <button type="button" class="auth-social-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        <span>Continue with Google</span>
      </button>

      <p class="auth-switch">New to NAGRIVA? <a href="signup.html">Create account</a></p>
    </form>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/auth.js"></script>
  <script>
    (function() {
      var form = document.getElementById('signInForm');
      var msg = document.getElementById('signinMessage');
      var btn = document.getElementById('signinSubmit');
      var params = new URLSearchParams(window.location.search);
      var redirectAfterLogin = params.get('redirect') || 'dashboard.html';

      function setMessage(type, text) {
        msg.textContent = text;
        msg.className = 'auth-message ' + type + ' show';
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = form.email.value.trim();
        var password = form.password.value.trim();
        msg.className = 'auth-message';

        if (!email || !password) {
          setMessage('error', 'Enter your email and password.');
          return;
        }

        btn.classList.add('loading');
        window.supabaseClient.auth.signInWithPassword({ email: email, password: password })
          .then(async function(resp) {
            if (resp.error) {
              var text = resp.error.message || 'Unable to sign in.';
              if (text.toLowerCase().includes('invalid login credentials')) text = 'Invalid email or password.';
              if (text.toLowerCase().includes('email not confirmed')) text = 'Confirm your email before signing in.';
              setMessage('error', text);
              return;
            }

            setMessage('success', 'Signed in. Redirecting...');
            try {
              var sessionResp = await window.supabaseClient.auth.getSession();
              var session = sessionResp.data.session;
              if (session) {
                var profileResp = await window.supabaseClient
                  .from('profiles')
                  .select('role')
                  .eq('id', session.user.id)
                  .single();
                if (profileResp.data && profileResp.data.role === 'admin' && !redirectAfterLogin.includes('admin')) {
                  window.location.href = 'admin-dashboard.html';
                  return;
                }
              }
            } catch (err) {}
            window.location.href = redirectAfterLogin;
          })
          .catch(function() {
            setMessage('error', 'Network error. Please try again.');
          })
          .finally(function() {
            btn.classList.remove('loading');
          });
      });
    })();
  </script>
  <script defer src="../js/navbar.js"></script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
</body>
</html>
