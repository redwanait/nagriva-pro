<body class="auth-page">
  <main class="auth-card" aria-labelledby="authTitle">
    <a class="auth-back-link" href="../index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
    <div class="auth-logo">
      <img src="../assets/images/branding/nagriva-logo.png" alt="Nagriva" />
    </div>

    <header class="auth-header">
      <h1 class="auth-title" id="authTitle">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your workspace.</p>
    </header>

    <form class="auth-form" id="signInForm" autocomplete="on" novalidate>
      <div class="auth-message" id="signinMessage" role="alert"></div>

      <div class="auth-field">
        <label class="auth-label" for="signinEmail">Email</label>
        <input id="signinEmail" name="email" type="email" class="auth-input" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="signinPassword">Password</label>
          <a href="forgot-password.html" class="auth-forgot">Forgot?</a>
        </div>
        <div class="auth-pw">
          <input id="signinPassword" name="password" type="password" class="auth-input" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="auth-pw-toggle" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="signinSubmit">
        <span class="auth-btn-text">Sign in</span>
        <span class="auth-btn-spinner" aria-hidden="true"></span>
      </button>

      <button type="button" class="auth-social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        <span>Continue with GitHub</span>
      </button>
      <button type="button" class="auth-social-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
        <span>Continue with Google</span>
      </button>

      <p class="auth-switch">New to Nagriva? <a href="signup.html">Create account</a></p>
    </form>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../js/supabase-config.js"></script>
  <script defer src="../js/auth-store.js"></script>
  <script defer src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('signInForm');
      var msg = document.getElementById('signinMessage');
      var btn = document.getElementById('signinSubmit');
      var params = new URLSearchParams(window.location.search);
      var redirectAfterLogin = params.get('redirect') || 'dashboard.html';
      var fromLimit = params.get('from_limit') === '1';
      console.log('[DEBUG login] DOMContentLoaded — params.redirect:', params.get('redirect'), '| redirectAfterLogin:', redirectAfterLogin, '| fromLimit:', fromLimit);
      console.log('[DEBUG login] current href:', window.location.href);

      if (params.get('account_deleted') === 'true') {
        setMsg('success', 'Your account has been permanently deleted. We\'re sorry to see you go.');
      }

      function setMsg(type, text) {
        msg.innerHTML = '';
        var icon = type === 'error'
          ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> '
          : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ';
        msg.innerHTML = icon + text;
        msg.className = 'auth-message ' + type + ' show';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = form.email.value.trim();
        var password = form.password.value.trim();
        msg.className = 'auth-message';

        if (!email || !password) {
          setMsg('error', 'Enter your email and password.');
          return;
        }

        btn.classList.add('loading');

        console.log('[DEBUG login] Calling signIn');
        var result = await NagrivaAuthStore.signIn(email, password);
        btn.classList.remove('loading');
        console.log('[DEBUG login] signIn returned. result.error:', result.error ? result.error.message : 'NONE');

        if (result.error) {
          console.log('[DEBUG login] ERROR branch — showing error');
          setMsg('error', NagrivaAuth.getAuthErrorMessage(result.error));
          return;
        }

        console.log('[DEBUG login] SUCCESS branch. redirectAfterLogin:', redirectAfterLogin, '| fromLimit:', fromLimit, '| isAuthenticated:', NagrivaAuthStore.isAuthenticated());
        setMsg('success', 'Signed in. Redirecting...');
        var session = NagrivaAuthStore.getSession();
        if (session) {
          try {
            var profileResp = await window.supabaseClient
              .from('profiles')
              .select('role')
              .eq('id', session.user.id)
              .single();
            console.log('[DEBUG login] admin check — role:', profileResp.data?.role);
            if (profileResp.data && profileResp.data.role === 'admin' && !redirectAfterLogin.includes('admin')) {
              console.log('[DEBUG login] ADMIN redirect to admin-dashboard.html');
              window.location.href = 'admin-dashboard.html';
              return;
            }
          } catch (err) {
            console.log('[DEBUG login] admin check error:', err);
          }
        }
        var sep = redirectAfterLogin.includes('?') ? '&' : '?';
        var target = redirectAfterLogin + (fromLimit ? sep + 'welcome=1' : '');
        console.log('[DEBUG login] SETTING location.href TO:', target);
        window.location.href = target;
      });

      function redirectIfReady() {
        console.log('[DEBUG login] redirectIfReady called. isLoading:', NagrivaAuthStore.isLoading(), '| isAuthenticated:', NagrivaAuthStore.isAuthenticated(), '| redirectAfterLogin:', redirectAfterLogin);
        if (!window.NagrivaAuthStore) { console.log('[DEBUG login] redirectIfReady — no store'); return; }
        if (NagrivaAuthStore.isLoading()) { console.log('[DEBUG login] redirectIfReady — still loading'); return; }
        if (NagrivaAuthStore.isAuthenticated() && redirectAfterLogin) {
          var s = redirectAfterLogin.indexOf('?') !== -1 ? '&' : '?';
          var target = redirectAfterLogin + (fromLimit ? s + 'welcome=1' : '');
          console.log('[DEBUG login] redirectIfReady — REDIRECTING TO:', target);
          window.location.href = target;
        } else {
          console.log('[DEBUG login] redirectIfReady — not authenticated or no redirect, doing nothing');
        }
      }

      if (!NagrivaAuthStore.isLoading()) {
        console.log('[DEBUG login] Auth store NOT loading, calling redirectIfReady immediately');
        redirectIfReady();
      } else {
        console.log('[DEBUG login] Auth store still loading, subscribing for changes');
        var _unsub = NagrivaAuthStore.subscribe(function(st) {
          console.log('[DEBUG login] subscriber fired. loading:', st.loading, '| authenticated:', !!st.user);
          if (!st.loading) { if (typeof _unsub === 'function') _unsub(); redirectIfReady(); }
        });
        setTimeout(function() {
          console.log('[DEBUG login] 5s timeout fired for redirectIfReady');
          redirectIfReady();
        }, 5000);
      }
    });
  </script>
  <script defer src="../js/performance-optimizer.js"></script>
  <script defer src="../js/lazy-loader.js"></script>
  <div id="cookie-consent-container"></div>
<script defer src="../js/layout.js"></script>
</body>
