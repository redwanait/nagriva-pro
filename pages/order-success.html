<head>

  <meta name="description" content="Your order has been received successfully. Thank you for choosing Nagriva." />

    :root {
      --osc-bg: #050816;
      --osc-accent: #FACC15;
      --osc-accent-glow: rgba(59, 130, 246, 0.3);
      --osc-text: #ffffff;
      --osc-text-secondary: #a1a1aa;
      --osc-text-muted: #71717a;
      --osc-card-bg: rgba(255, 255, 255, 0.02);
      --osc-card-border: rgba(255, 255, 255, 0.06);
      --osc-radius: 24px;
      --osc-radius-sm: 16px;
    }

    .osc-page {
      padding-top: calc(68px + 40px);
      background: var(--osc-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .osc-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .osc-card {
      max-width: 520px;
      width: 100%;
      margin: 0 24px;
      background: var(--osc-card-bg);
      border: 1px solid var(--osc-card-border);
      border-radius: var(--osc-radius);
      padding: 56px 40px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.02), 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: oscCardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes oscCardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .osc-icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: oscIconPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .osc-icon-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(34, 197, 94, 0.15);
      animation: oscRipple 2s ease-out infinite;
    }

    .osc-icon-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(34, 197, 94, 0.08);
      animation: oscRipple 2s ease-out 0.5s infinite;
    }

    @keyframes oscRipple {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    @keyframes oscIconPop {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }

    .osc-icon-wrap svg {
      width: 36px;
      height: 36px;
      color: #10B981;
    }

    .osc-card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 60%, rgba(59, 130, 246, 0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: oscFadeUp 0.5s ease 0.3s both;
    }

    .osc-success-sub {
      color: var(--osc-text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.6;
      animation: oscFadeUp 0.5s ease 0.4s both;
    }

    @keyframes oscFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .osc-ref-box {
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(59, 130, 246, 0.04);
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: var(--osc-radius-sm);
      animation: oscFadeUp 0.5s ease 0.5s both;
    }

    .osc-ref-label {
      color: var(--osc-text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .osc-ref-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--osc-accent);
      letter-spacing: 0.02em;
    }

    .osc-details {
      text-align: left;
      margin-bottom: 32px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--osc-radius-sm);
      animation: oscFadeUp 0.5s ease 0.6s both;
    }

    .osc-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }

    .osc-detail-row + .osc-detail-row {
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    .osc-detail-label {
      color: var(--osc-text-muted);
      font-size: 0.85rem;
    }

    .osc-detail-value {
      font-size: 0.9rem;
      font-weight: 600;
      text-align: right;
    }

    .osc-detail-value.price {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--osc-accent), #FCD34D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .osc-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .osc-badge--paid {
      background: rgba(34, 197, 94, 0.1);
      color: #10B981;
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .osc-badge--pending {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.15);
    }

    .osc-date {
      font-size: 0.78rem;
      color: var(--osc-text-muted);
      margin-top: 4px;
    }

    .osc-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: oscFadeUp 0.5s ease 0.7s both;
    }

    .osc-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 28px;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      cursor: pointer;
    }

    .osc-btn--primary {
      background: linear-gradient(135deg, var(--osc-accent), #F59E0B);
      color: #fff;
      border: none;
    }

    .osc-btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.35), 0 0 60px rgba(59, 130, 246, 0.1);
    }

    .osc-btn--secondary {
      background: rgba(255, 255, 255, 0.03);
      color: var(--osc-text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .osc-btn--secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .osc-btn--whatsapp {
      background: #25d366;
      color: #000;
      border: none;
    }

    .osc-btn--whatsapp:hover {
      background: #20bd5a;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.3);
    }

    .osc-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .osc-actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .osc-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      margin: 24px 0;
      animation: oscFadeUp 0.5s ease 0.65s both;
    }

    @media (max-width: 480px) {
      .osc-card { padding: 40px 24px 32px; margin: 0 16px; }
      .osc-card h1 { font-size: 1.5rem; }
      .osc-actions-row { grid-template-columns: 1fr; }
      .osc-icon-wrap { width: 64px; height: 64px; }
      .osc-icon-wrap svg { width: 28px; height: 28px; }
    }
  </style>

<body data-page="order-success">

  <div id="navbar-container"></div>

  <main class="osc-page">
    <div class="osc-card">
      <div class="osc-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h1>Order Received Successfully</h1>
      <p class="osc-success-sub">Thank you for your order. We will start working on your project shortly.</p>

      <div id="orderRef" class="osc-ref-box">
        <div class="osc-ref-label">Order Number</div>
        <div class="osc-ref-value" id="orderIdDisplay">—</div>
        <div class="osc-date" id="orderDateDisplay"></div>
      </div>

      <div id="orderDetails" class="osc-details">
        <div class="osc-detail-row">
          <span class="osc-detail-label">Service</span>
          <span class="osc-detail-value" id="detailService">—</span>
        </div>
        <div class="osc-detail-row">
          <span class="osc-detail-label">Package</span>
          <span class="osc-detail-value" id="detailPackage">—</span>
        </div>
        <div class="osc-detail-row">
          <span class="osc-detail-label">Amount</span>
          <span class="osc-detail-value price" id="detailPrice">—</span>
        </div>
        <div class="osc-detail-row">
          <span class="osc-detail-label">Payment Method</span>
          <span class="osc-detail-value" id="detailMethod">—</span>
        </div>
        <div class="osc-detail-row">
          <span class="osc-detail-label">Status</span>
          <span class="osc-detail-value">
            <span class="osc-badge osc-badge--paid" id="detailStatus">Pending</span>
          </span>
        </div>
      </div>

      <div class="osc-divider"></div>

      <div class="osc-actions">
        <a href="dashboard.html" class="osc-btn osc-btn--primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          View Dashboard
        </a>
        <div class="osc-actions-row">
          <a href="#" class="osc-btn osc-btn--secondary" id="viewOrderBtn" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            View Order
          </a>
          <a href="#" class="osc-btn osc-btn--whatsapp" id="whatsappOrderBtn" target="_blank" rel="noopener">

            Chat on WhatsApp
          </a>
          <a href="/" class="osc-btn osc-btn--secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back Home
          </a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script>
    var WHATSAPP_NUMBER = '21261818403';

    (function() {
      var params = new URLSearchParams(window.location.search);
      var orderId = params.get('order_id');
      var orderNumber = params.get('order_number');
      var serviceName = params.get('service');
      var packageName = params.get('package');
      var price = params.get('price');
      var method = params.get('method');

      var viewOrderBtn = document.getElementById('viewOrderBtn');
      if (viewOrderBtn && orderId) {
        viewOrderBtn.href = 'order-tracking.html?id=' + encodeURIComponent(orderId);
        viewOrderBtn.style.display = '';
      }

      var dispOrderNum = orderNumber || (orderId ? '#' + orderId.slice(0, 8).toUpperCase() : 'NAG-2026-001');
      var refEl = document.getElementById('orderRef');
      var idEl = document.getElementById('orderIdDisplay');
      if (refEl && idEl) {
        idEl.textContent = dispOrderNum;
        refEl.style.display = 'block';
      }

      var dateEl = document.getElementById('orderDateDisplay');
      if (dateEl) {
        var now = new Date();
        var options = { year: 'numeric', month: 'long', day: 'numeric' };
        dateEl.textContent = 'Order placed: ' + now.toLocaleDateString('en-US', options);
      }

      var detailsEl = document.getElementById('orderDetails');
      if (detailsEl) {
        if (serviceName) document.getElementById('detailService').textContent = decodeURIComponent(serviceName);
        if (packageName) document.getElementById('detailPackage').textContent = decodeURIComponent(packageName);
        if (price) document.getElementById('detailPrice').textContent = Number(price).toLocaleString('en-US') + ' MAD';

        if (method) {
          var methodLabels = {
            'paypal': 'PayPal',
            'payoneer': 'Payoneer',
            'whatsapp': 'WhatsApp Order',
            'visa': 'Visa',
            'mastercard': 'Mastercard'
          };
          var methodName = methodLabels[method] || method;
          document.getElementById('detailMethod').textContent = methodName;

          var isPaid = method === 'paypal';
          var statusEl = document.getElementById('detailStatus');
          if (statusEl) {
            statusEl.textContent = isPaid ? 'Paid' : 'Pending';
            statusEl.className = 'osc-badge ' + (isPaid ? 'osc-badge--paid' : 'osc-badge--pending');
          }
        }
      }

      var waBtn = document.getElementById('whatsappOrderBtn');
      if (waBtn) {
        var waService = serviceName ? decodeURIComponent(serviceName) : 'a service';
        var waPackage = packageName ? decodeURIComponent(packageName) : '';
        var waPrice = price ? Number(price).toLocaleString('en-US') + ' MAD' : '';
        var waMessage = 'Hello Nagriva,\n\nI have placed an order:\n\nService: ' + waService + '\nPackage: ' + waPackage + '\nAmount: ' + waPrice + '\nOrder: ' + dispOrderNum + '\n\nPlease contact me regarding this project.';
        waBtn.href = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(waMessage);
      }
    })();
  </script>

</body>
