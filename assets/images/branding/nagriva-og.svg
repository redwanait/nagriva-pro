<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040404"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5c4"/>
      <stop offset="100%" stop-color="#00c2a8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00f5c4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f5c4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- Accent line -->
  <rect x="60" y="190" width="4" height="250" rx="2" fill="url(#accent)"/>
  <!-- Tag -->
  <text x="88" y="238" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#00f5c4" letter-spacing="4" font-weight="500" text-transform="uppercase">DIGITAL GROWTH AGENCY</text>
  <!-- Title -->
  <text x="88" y="310" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="72" fill="#ffffff" font-weight="700" letter-spacing="-1">NAGRIVA</text>
  <!-- Tagline -->
  <text x="88" y="370" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#a1a1aa" font-weight="400" letter-spacing="0.5">Web Design · SEO · AI Automation · Branding</text>
  <!-- URL -->
  <text x="88" y="430" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#00f5c4" letter-spacing="2">nagriva.com</text>
  <!-- Decorative dot -->
  <circle cx="1088" cy="142" r="4" fill="#00f5c4" opacity="0.6"/>
  <circle cx="1110" cy="142" r="2" fill="#00f5c4" opacity="0.3"/>
