  <text x="630" y="182" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)">#00f5c4</text>
  <rect x="598" y="195" width="24" height="24" rx="6" fill="#0a0a0f" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="630" y="212" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)">#0a0a0f</text>
  <rect x="598" y="225" width="24" height="24" rx="6" fill="#fff"/>
  <text x="630" y="242" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)">#ffffff</text>
  <rect x="598" y="255" width="24" height="24" rx="6" fill="#4facfe"/>
  <text x="630" y="272" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)">#4facfe</text>
