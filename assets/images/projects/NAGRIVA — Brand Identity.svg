  <text x="100" y="155" font-family="'Syne',sans-serif" font-size="22" font-weight="800" fill="#fff" letter-spacing="-0.5">NAGRIVA</text>
  <text x="100" y="182" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.35)">Digital Growth Agency</text>
  <rect x="100" y="200" width="240" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="215" width="100" height="28" rx="14" fill="rgba(0,245,196,0.1)" stroke="rgba(0,245,196,0.15)" stroke-width="0.5"/>
