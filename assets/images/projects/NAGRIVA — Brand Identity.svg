  <text x="80" y="375" font-family="Georgia,serif" font-size="20" font-weight="700" fill="#fff" letter-spacing="-0.3">Syne Bold</text>
  <text x="80" y="395" font-family="Georgia,serif" font-size="14" fill="rgba(255,255,255,0.4)">Syne Regular · DM Sans · System UI</text>
  <text x="80" y="418" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.25)">ABCDEFGHIJKLMNOPQRSTUVWXYZ</text>
  <!-- Brand mockups -->
  <rect x="400" y="320" width="340" height="120" rx="12" fill="#12121e" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <text x="420" y="348" font-family="system-ui" font-size="10" font-weight="600" fill="#fff">Applications</text>
  <rect x="420" y="362" width="90" height="60" rx="6" fill="rgba(0,245,196,0.04)" stroke="rgba(0,245,196,0.08)" stroke-width="0.5"/>
  <rect x="435" y="377" width="60" height="30" rx="4" fill="rgba(0,245,196,0.1)"/>
  <text x="442" y="396" font-family="'Syne',sans-serif" font-size="8" font-weight="700" fill="#00f5c4">N</text>
  <rect x="525" y="362" width="90" height="60" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="540" y="375" width="60" height="36" rx="4" fill="#1a1a28" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <rect x="548" y="383" width="20" height="20" rx="3" fill="rgba(0,245,196,0.08)"/>
  <text x="630" y="362" width="90" height="60" rx="6" fill="rgba(79,172,254,0.04)" stroke="rgba(79,172,254,0.08)" stroke-width="0.5"/>
  <text x="642" y="387" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.3)">Coming Soon</text>
  <!-- Brand values -->
  <rect x="60" y="460" width="220" height="60" rx="10" fill="rgba(0,245,196,0.04)" stroke="rgba(0,245,196,0.08)" stroke-width="0.5"/>
  <text x="80" y="488" font-family="system-ui" font-size="12" font-weight="600" fill="#00f5c4">Precision</text>
  <text x="80" y="506" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">Every pixel, deliberate.</text>
  <rect x="295" y="460" width="220" height="60" rx="10" fill="rgba(79,172,254,0.04)" stroke="rgba(79,172,254,0.08)" stroke-width="0.5"/>
  <text x="315" y="488" font-family="system-ui" font-size="12" font-weight="600" fill="#4facfe">Performance</text>
  <text x="315" y="506" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">Built for speed.</text>
  <rect x="530" y="460" width="210" height="60" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <text x="550" y="488" font-family="system-ui" font-size="12" font-weight="600" fill="#fff">Simplicity</text>
  <text x="550" y="506" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">Clean. Clear. Effective.</text>
