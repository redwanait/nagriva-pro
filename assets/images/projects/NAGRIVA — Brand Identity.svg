<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0a0a0f"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#bgGrad)" opacity="0.4"/>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(0,245,196,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5c4"/>
      <stop offset="50%" stop-color="#00c2a8"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
  </defs>
  <rect x="60" y="40" width="160" height="40" rx="8" fill="rgba(0,245,196,0.08)" stroke="rgba(0,245,196,0.15)" stroke-width="0.5"/>
  <text x="78" y="66" font-family="'Syne',sans-serif" font-size="14" font-weight="700" fill="#00f5c4">NAGRIVA</text>
  <text x="240" y="66" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.3)">Brand · Identity · Digital</text>
  <rect x="60" y="100" width="680" height="200" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
