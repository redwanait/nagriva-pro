  <rect x="215" y="215" width="120" height="28" rx="14" fill="rgba(79,172,254,0.1)" stroke="rgba(79,172,254,0.15)" stroke-width="0.5"/>
  <text x="228" y="234" font-family="system-ui" font-size="10" font-weight="500" fill="#4facfe">Full Rebrand</text>
