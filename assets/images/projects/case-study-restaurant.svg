<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e0a"/>
      <stop offset="50%" style="stop-color:#2a1a10"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#lg1)"/>
  <rect width="800" height="500" fill="url(#lg2)"/>
  <g opacity="0.03">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#fff" stroke-width="0.5"/>
  </g>
  <ellipse cx="400" cy="250" rx="250" ry="200" fill="#3b82f6" opacity="0.06" filter="url(#blur)"/>
  <!-- Fork & Knife icon -->
  <g transform="translate(400,205)" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Fork -->
    <line x1="-30" y1="-65" x2="-30" y2="70"/>
    <!-- Fork prongs top -->
    <line x1="-50" y1="-65" x2="-50" y2="-30"/>
    <line x1="-30" y1="-65" x2="-30" y2="-30"/>
    <line x1="-10" y1="-65" x2="-10" y2="-30"/>
    <!-- Fork prong connector -->
    <path d="M-50,-30 L-10,-30"/>
    <!-- Fork handle curve -->
    <path d="M-30,25 C-30,40 -30,55 -30,70"/>
    <!-- Knife -->
    <line x1="30" y1="-65" x2="30" y2="70"/>
    <!-- Knife blade -->
    <path d="M30,-65 C45,-50 45,-20 30,-10"/>
    <!-- Knife handle -->
    <path d="M30,25 C30,40 30,55 30,70"/>
  </g>
  <!-- Stars decoration -->
  <g fill="#3b82f6" opacity="0.25">
    <circle cx="250" cy="150" r="3"/>
    <circle cx="550" cy="140" r="2"/>
    <circle cx="570" cy="180" r="1.5"/>
    <circle cx="230" cy="170" r="1.5"/>
    <circle cx="530" cy="350" r="2"/>
    <circle cx="270" cy="360" r="1.5"/>
  </g>
  <text x="400" y="430" font-family="System, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" letter-spacing="3" opacity="0.6">RESTAURANT</text>
</svg>
